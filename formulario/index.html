<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Hamburgueseria — Pedidos Online</title>
    <link rel="stylesheet" href="index.css">
  </head>

  <body>
    <header>
      <h1>Hamburgueseria</h1>
      <p>Pedidos online</p>
    </header>

    <main>
      <div>
        <h2>Tu pedido</h2>

        <section>
          <h3>Tus datos</h3>

          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre" required />

          <label for="direccion">Direccion</label>
          <input type="direccion" id="direccion" name="direccion" required />

          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" name="telefono" />
        </section>

        <section>
          <h3>Tamaño</h3>

          <input type="radio" id="simple" name="simple" value="simple" />
          <label for="simple">Simple (1 carne)</label>

          <input type="radio" id="doble" name="doble" value="doble" />
          <label for="doble">Doble (2 carnes)</label>

          <input type="radio" id="triple" name="triple" value="triple" />
          <label for="triple">Triple (3 carnes)</label>
        </section>

        <section>
          <h3>Para tomar</h3>

          <label for="bebida">Bebida</label>
          <select id="bebida" name="bebida" required>
            <option value="">-- Elegí una --</option>
            <option value="clasica">CocaCola</option>
            <option value="delgada">Sprite</option>
            <option value="rellena">Pepsi</option>
          </select>
        </section>

        <section>
          <h3>Ingredientes extra</h3>

          <input
            type="checkbox"
            id="cebolla"
            name="cebolla"
            value="cebolla"
          />
          <label for="cebolla">Cebolla caramelizada</label>

          <input
            type="checkbox"
            id="huevo"
            name="huevo"
            value="huevo"
          />
          <label for="huevo">Huevo</label>

          <input
            type="checkbox"
            id="bacon"
            name="bacon"
            value="bacon"
          />
          <label for="bacon">Bacon</label>

        
        <section>
          <h3>Cantidad</h3>

          <label for="cantidad">¿Cuántas hamburguesas?</label>
          <input
            type="number"
            id="cantidad"
            name="cantidad"
            min="1"
            max="10"
            value="1"
            required
          />
        </section>

        <section>
          <h3>Reseñas</h3>

          <label for="comentarios">¿Que te parecio?</label>
          <textarea id="comentarios" name="comentarios" rows="4"></textarea>
        </section>

        <button id="button" type="submit">Hacer pedido</button>
      <div id="mensaje"></div>
    </main>

    <footer>
      <p>Hamburgueseria — Villa Celina, Buenos Aires</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
